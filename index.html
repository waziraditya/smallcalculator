<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quadratic Zeros Finder</title>
  <link rel="stylesheet" href="styles.css">
  <script src="calculator.js" defer></script>
</head>
<body>
  <main>
    <h1>Quadratic Zeros Finder</h1>
    <p>Enter values for ax² + bx + c, then calculate the zeros.</p>

    <form id="calculator-form">
      <label for="a">
        a
        <input id="a" name="a" type="number" step="any" required>
      </label>

      <label for="b">
        b
        <input id="b" name="b" type="number" step="any" required>
      </label>

      <label for="c">
        c
        <input id="c" name="c" type="number" step="any" required>
      </label>

      <button type="submit">Find zeros</button>
    </form>

    <section class="result" aria-live="polite">
      <h2>Result</h2>
      <p id="result">Your zeros will appear here after calculation.</p>
    </section>
  </main>
</body>
</html>
